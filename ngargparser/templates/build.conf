# Build configuration (optional).
# Copy this file and adjust for your project. If missing, build.sh uses generic defaults.
# All values are optional; unset or empty means "use default".
#
# This file is USER-OWNED — `cli sync` does not overwrite it. Project-specific build
# customizations belong here, not in build.sh (which is framework-owned and gets
# overwritten on sync).
#
# Default behavior: build.sh SYMLINKS most things into the build dir for speed and to
# avoid duplicating large trees. The exceptions are listed in EXCLUDE_FROM_BUILD_SYMLINK
# below — those items are physically copied. `tar -chzf` dereferences symlinks at
# packaging time, so the produced tarball is identical regardless.

# Tool-name customization (optional; rare).
# By default, TOOL_NAME is computed as "ng_${APP_NAME_NORMALIZED}", where
# APP_NAME_NORMALIZED defaults to basename(project root).
#
# Set APP_NAME_NORMALIZED if your project's directory name needs adjusting before
# becoming part of TOOL_NAME. Example for b-cell-* projects whose directory name
# starts with "b-cell-" but should ship as "bcell-..." in the tarball/TOOL_NAME:
#     APP_NAME_NORMALIZED="${APP_NAME/#b-cell/bcell}"
APP_NAME_NORMALIZED=""

# Items to COPY into the build dir instead of symlinking (space-separated; supports
# bash glob patterns). Default: "libs run_*.py" — libs/ is bulky vendored dependencies
# (also gets .git stripped, __init__.py ensured); run_*.py is the entry script(s),
# copied so the build dir is runnable independent of the source tree.
#
# Add patterns here for any additional items your project wants physically copied.
# Patterns match against the basename of each top-level item and each src/ entry.
EXCLUDE_FROM_BUILD_SYMLINK="libs run_*.py"

# Tarball filename prefix (e.g. IEDB_). Empty = no prefix (tarball is TOOL_NAME-VERSION.tar.gz).
TARBALL_PREFIX="IEDB_"