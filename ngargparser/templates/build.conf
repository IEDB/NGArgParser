# Build configuration (optional).
# Copy this file and adjust for your project. If missing, build.sh uses generic defaults.
# All values are optional; unset or empty means "use default".
#
# This file is USER-OWNED — `cli sync` does not overwrite it. Project-specific build
# customizations belong here, not in build.sh (which is framework-owned and gets
# overwritten on sync).

# Tool-name customization (optional; rare).
# Default: APP_NAME = basename(project root); APP_NAME_NORMALIZED = APP_NAME;
#          TOOL_NAME = "ng_${APP_NAME_NORMALIZED}".
#
# Set APP_NAME_NORMALIZED if your project's directory name needs adjusting before
# becoming part of TOOL_NAME. Example for b-cell-* projects whose directory name
# starts with "b-cell-" but should ship as "bcell-..." in the tarball/TOOL_NAME:
#     APP_NAME_NORMALIZED="${APP_NAME/#b-cell/bcell}"
#
# Set TOOL_NAME directly to override the entire tool name (skips the default
# "ng_${APP_NAME_NORMALIZED}" composition). Most projects don't need this.
APP_NAME_NORMALIZED=""
TOOL_NAME=""

# Main entry script(s) in src/ to COPY into build (space-separated). Others are symlinked.
BUILD_ENTRY_SCRIPT=""

# src/ subdirectories whose CONTENTS are symlinked; other dirs are copied (space-separated).
BUILD_SYMLINK_SRC_DIRS=""

# Top-level files/dirs to COPY into build; others are symlinked (space-separated).
# src, libs, scripts, requirements.txt are always handled explicitly.
BUILD_COPY_TOPLEVEL_FILES="configure license-LJI.txt README"

# Tarball filename prefix (e.g. IEDB_). Empty = no prefix (tarball is TOOL_NAME-VERSION.tar.gz).
TARBALL_PREFIX="IEDB_"